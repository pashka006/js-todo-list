<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional To-Do List</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main class="todo-app">
        <header class="todo-app__header">
            <h1 class="todo-app__title">Список завдань</h1>
        </header>

        <section class="todo-app__content">
            <form class="todo-form" id="todo-form">
                <input 
                    type="text" 
                    class="todo-form__input" 
                    id="todo-input" 
                    placeholder="Що потрібно зробити?" 
                    aria-label="Введіть нове завдання"
                    required
                >
                <button type="submit" class="todo-form__btn">Додати</button>
            </form>

            <ul class="todo-list" id="todo-list">
            </ul>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
